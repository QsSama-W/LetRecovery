name: Cargo Fix (auto cleanup)

# 一次性维护工作流：用 cargo fix 自动移除未用导入等告警，cargo fmt 统一格式，
# 然后把改动提交回当前分支。手动触发。
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cargo-fix:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: Cargo fix (移除未用导入等)
        run: cargo fix --workspace --allow-dirty --allow-no-vcs

      - name: Cargo fmt
        run: cargo fmt --all

      - name: 验证仍可编译
        run: cargo build --workspace

      - name: 提交并推回当前分支
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if (git diff --cached --quiet) {
            Write-Host "无改动，跳过提交"
          } else {
            git commit -m "chore: cargo fix 自动清理未用导入 + cargo fmt"
            git push origin HEAD:${{ github.ref_name }}
          }
